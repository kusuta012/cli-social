name: Build and Push Multi-Arch Image

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-amd64:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push AMD64
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/sxcl:amd64
            ghcr.io/${{ github.repository_owner }}/sxcl:latest 
          build-args: BUILD_ID=${{ github.run_id }}
          cache-from: type=gha,scope=amd64
          cache-to: type=gha,mode=max,scope=amd64

  build-arm64:
    runs-on: ubuntu-24.04-arm64
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push ARM64
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/sxcl:arm64
          build-args: BUILD_ID=${{ github.run_id }}
          cache-from: type=gha,scope=arm64
          cache-to: type=gha,mode=max,scope=arm64

  create-manifest:
    needs: [build-amd64, build-arm64]
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Create and push multi-arch manifest
        run: |
          # This command creates one 'sxcl:latest' identifier
          # that points to BOTH architecture-specific builds.
          docker manifest create ghcr.io/${{ github.repository_owner }}/sxcl:latest \
            --amend ghcr.io/${{ github.repository_owner }}/sxcl:amd64 \
            --amend ghcr.io/${{ github.repository_owner }}/sxcl:arm64
          docker manifest push ghcr.io/${{ github.repository_owner }}/sxcl:latest
